<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>green-earth</title>
    <!-- tailwind & daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts ital -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <main class="bg-[#F0FDF4]">
        <section class="w-11/12 mx-auto  ">
            <h1 class="text-4xl  font-bold text-center">Choose Your Trees</h1>
            <div class="grid grid-cols-1 sm:grid-cols-10 gap-8 mt-12">
                <div class=" col-span-2 space-y-3">
                    <h2 class="font-bold text-xl ">Categories</h2>
                    <div class="sticky top-8">
                        <button id="allTreesBtn"
                            class="btn w-full btn-outline border-none text-xl justify-start text-white bg-green">All
                            Trees</button>
                        <!-- categories container -->
                        <div id="categories-container" class="space-y-">


                        </div>
                    </div>
                </div>
                <div class=" col-span-6">
                    <div id="trees-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-1 space-y-4">


                    </div>
                    <!-- loading spinner -->
                    <div id="loading-spinner" class="flex justify-center items-center h-[60vh] hidden">
                        <span class="loading loading-spinner loading-xl"></span>
                    </div>


                </div>
                <div class=" col-span-2 bg-white p-2">
                    <h2 class="font-bold text-2xl pl-2 mb-3">Your Cart</h2>
                    <div class="card  shadow-2xl bg-[#F0FDF4] p-2">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-xl font-medium">mango</p>
                                <p>$500 x 1</p>
                            </div>
                            <button class="btn btn-outline btn-ghost btn-circle border-none">X</button>
                        </div>
                        <p class="font-semibold text-right">$500</p>

                    </div>

                </div>
            </div>

        </section>


        <dialog id="tree-details-modal" class="modal">
            <div class="modal-box">
                <div class="flex justify-between">
                    <h3 id="modalTaitle" class="font-bold text-2xl text-green-700">trees</h3>
                    <button class="btn btn-sm btn-circle btn-outline btn-ghost"
                        onclick="document.getElementById('tree-details-modal').close()">X</button>
                </div>
                <div class="gap-6">
                    <img id="modalImg" src="" alt="plant" class="w-full h-[250px] object-cover rounded-lg mt-12">
                    <div>
                        <p class="text-sm text-gray-500 mb-2 mt-2">
                            <span class="font-bold">category :</span>
                            <span id="modelCategory" class="badge badge-success"></span>
                        </p>
                        <p class="text-sm text-gray-500 mb-2 ">
                            <span id="modelDescription" class=""></span>
                        </p>
                        <div class="flex items-baseline gap2 mb-6">
                            <span class="text-3xl font-bold text-green-600">$ <span id="modalPrice">0</span>
                            </span>
                        </div>

                    </div>
                </div>
                <!-- <div class="modal-action">
                    <form method="dialog">
                    
                        <button class="btn">Close</button>
                    </form>
                </div> -->
            </div>
        </dialog>
    </main>


    <script src="./script/index.js"></script>
</body>

</html>
