<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>green-earth</title>
    <!-- tailwind & daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts ital -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <main class="bg-[#F0FDF4]">
        <section class="w-11/12 mx-auto  ">
            <h1 class="text-4xl  font-bold text-center">Choose Your Trees</h1>
            <div class="grid grid-cols-10 gap-8 mt-12">
                <div class=" col-span-2 space-y-3">
                    <h2 class="font-bold text-xl ">Categories</h2>
                    <div>
                        <button id="allTreestn" class="btn w-full justify-start text-white bg-green">All Trees</button>
                        <!-- categories container -->
                        <div id="categories-container" class="space-y-">


                        </div>
                    </div>
                </div>
                <div class=" col-span-6">
                    <div id="trees-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-1 space-y-4">
                       

                    </div>
                    <!-- loading spinner -->
                     <div id="loading-spinner" class="flex justify-center items-center h-[60vh] hidden">
                        <span class="loading loading-spinner loading-xl"></span>
                     </div>
                    

                </div>
                <div class=" col-span-2">
                    <h2 class="font-bold">Your Cart</h2>
                </div>
            </div>

        </section>
    </main>

    <script src="./script/index.js"></script>

</html>
